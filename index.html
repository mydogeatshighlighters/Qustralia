<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Comments</title>
    <style>
        /* Main Page Style */
        body {
            text-align: center;
            color: #8083ff;
            background-color: #f8ff80; /* Your yellow background */
            font-family: 'Comic Sans MS', sans-serif; /* Optional: changed for a fun vibe */
            max-width: 600px;
            margin: auto;
            padding: 20px;
        }

        /* Input Area */
        .comment-container {
            background: white;
            padding: 20px;
            border-radius: 15px;
            color: #333;
            box-shadow: 5px 5px 0px #8083ff; /* Retro shadow */
            margin-bottom: 30px;
        }

        input, textarea { 
            width: 100%; 
            padding: 10px; 
            margin: 5px 0 15px; 
            border: 2px solid #8083ff; 
            border-radius: 8px; 
            display: block; 
            box-sizing: border-box;
        }

        button { 
            background: #00e599; 
            color: black; 
            border: 2px solid black;
            padding: 12px; 
            cursor: pointer; 
            border-radius: 8px; 
            font-weight: bold; 
            width: 100%;
        }

        button:disabled {
            background: #cccccc;
            cursor: not-allowed;
        }

        /* The Comment Bubbles */
        #list {
            margin-top: 30px;
            text-align: left;
        }

        .comment { 
            padding: 15px; 
            margin-bottom: 15px;
            border-radius: 20px;
            border: 2px solid #000;
            box-shadow: 4px 4px 0px rgba(0,0,0,0.1);
        }

        /* Odd comments are Green */
        .comment:nth-child(odd) {
            background-color: #b3ffcc; /* Pastel Green */
            color: #006633;
        }

        /* Even comments are Pink */
        .comment:nth-child(even) {
            background-color: #ffcce6; /* Pastel Pink */
            color: #99004d;
        }
        
        .comment b { 
            display: block;
            border-bottom: 1px solid rgba(0,0,0,0.1);
            margin-bottom: 5px;
            font-size: 1.1rem;
        }

        /* Floating Icons */
        .floating-icon {
            position: fixed;
            bottom: 20px;
            right: 20px;
            z-index: 1000;
        }

        .loading {
            color: #666;
            font-style: italic;
        }

        .error {
            color: #cc0000;
            font-weight: bold;
        }
    </style>
</head>
<body>

    <h1>comment or wtv.</h1>

    <div class="comment-container">
        <input id="user" placeholder="Your Name">
        <textarea id="msg" placeholder="Write a comment..."></textarea>
        <button id="postBtn" onclick="send()">Post Comment</button>
    </div>

    <div id="list">Loading comments...</div>

    <div class="floating-icon">
        <a href="https://australiaisnotreal.netlify.app/music" target="_blank" rel="noopener noreferrer">
            <img src="music.gif" width="100px" alt="Music">
        </a><br/>
        <a href="https://australiaisnotreal.netlify.app" target="_blank" rel="noopener noreferrer">
            <img src="star.gif" width="100px" alt="Star">
        </a>
    </div>

    <script>
        // Helper function to escape HTML and prevent XSS
        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        async function load() {
            try {
                const res = await fetch('/.netlify/functions/comments');
                const data = await res.json();
                const listDiv = document.getElementById('list');
                
                if (!data || data.length === 0) {
                    listDiv.innerHTML = "<p>No comments yet. Be the first!</p>";
                    return;
                }

                listDiv.innerHTML = data.map(c => 
                    `<div class="comment"><b>${escapeHtml(c.username)} says:</b>${escapeHtml(c.content)}</div>`
                ).join('');
            } catch (err) {
                document.getElementById('list').innerHTML = '<p class="error">Error loading comments.</p>';
            }
        }

        async function send() {
            const username = document.getElementById('user').value.trim();
            const content = document.getElementById('msg').value.trim();
            const postBtn = document.getElementById('postBtn');

            // Validation with trimmed values
            if(!username || !content) {
                alert("Fill everything in!");
                return;
            }

            // Disable button and show loading state
            postBtn.disabled = true;
            postBtn.textContent = "Posting...";

            try {
                const res = await fetch('/.netlify/functions/comments', {
                    method: 'POST',
                    body: JSON.stringify({ username, content })
                });

                if (!res.ok) {
                    alert("Failed to post comment. Try again!");
                    return;
                }

                // Clear input fields on success
                document.getElementById('user').value = ''; 
                document.getElementById('msg').value = ''; 
                load();
            } catch (err) {
                alert("Error posting comment. Please try again.");
            } finally {
                // Re-enable button
                postBtn.disabled = false;
                postBtn.textContent = "Post Comment";
            }
        }

        load(); 
    </script>
</body>
</html>
